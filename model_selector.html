<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Ultron Model Selector</title>
<style>
body { margin: 0; background: #030611; color: #fff; font-family: monospace; padding: 20px; }
h1 { color: #06b6d4; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
.model-card { border: 2px solid #4f46e5; border-radius: 10px; padding: 15px; background: #0a1020; }
.model-card h3 { color: #22c55e; margin: 0 0 10px 0; }
.viewer { width: 100%; height: 300px; background: #030611; border: 1px solid #333; border-radius: 5px; position: relative; }
canvas { width: 100%; height: 100%; display: block; }
.status { margin-top: 10px; font-size: 12px; color: #8ba8c7; }
button { background: #4f46e5; color: #fff; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
button:hover { background: #60a5fa; }
.selected { border-color: #22c55e; background: #0d1a1a; }
</style>
</head>
<body>
<h1>🤖 Ultron Avatar Model Selector</h1>
<p>Select the best Ultron model for the Vision GUI:</p>

<div class="grid" id="modelGrid"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const models = [
  { name: 'Ultron V1', file: 'ultron-v1.glb', desc: 'Base export' },
  { name: 'Ultron V3', file: 'ultron-v3.glb', desc: 'Variant 3' },
  { name: 'Ultron V4', file: 'ultron-v4.glb', desc: 'Variant 4' },
  { name: 'Ultron V5', file: 'ultron-v5.glb', desc: 'Variant 5 (current)' },
  { name: 'Toon Trooper', file: '../assets/ultron-avatar.glb', desc: 'Fallback model' },
];

const grid = document.getElementById('modelGrid');

models.forEach(modelInfo => {
  const card = document.createElement('div');
  card.className = 'model-card';
  if (modelInfo.file === 'ultron-v5.glb') card.classList.add('selected');

  card.innerHTML = `
    <h3>${modelInfo.name}</h3>
    <p>${modelInfo.desc}</p>
    <div class="viewer" id="viewer-${modelInfo.file}">
      <canvas></canvas>
    </div>
    <div class="status" id="status-${modelInfo.file}">Loading...</div>
    <button onclick="selectModel('${modelInfo.file}')">Use This Model</button>
  `;

  grid.appendChild(card);

  // Load model
  setTimeout(() => loadModel(modelInfo.file), 100);
});

function loadModel(filename) {
  const canvas = document.querySelector(`#viewer-${filename} canvas`);
  const status = document.getElementById(`status-${filename}`);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x030611);

  const camera = new THREE.PerspectiveCamera(45, 300 / 300, 0.1, 1000);
  camera.position.set(0, 1.2, 3.5);
  camera.lookAt(0, 1, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(300, 300);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const ambient = new THREE.AmbientLight(0x4f46e5, 0.5);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0x06b6d4, 1.5);
  key.position.set(3, 4, 2);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x4f46e5, 0.8);
  fill.position.set(-2, 2, -1);
  scene.add(fill);

  const loader = new GLTFLoader();
  loader.load(
    `/assets/${filename}`,
    (gltf) => {
      const model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.0 / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));
      model.position.y = 0;

      model.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.metalness = 0.7;
          child.material.roughness = 0.3;
          child.material.emissive = new THREE.Color(0x4f46e5);
          child.material.emissiveIntensity = 0.2;
        }
      });

      scene.add(model);

      let mixer;
      if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        const action = mixer.clipAction(gltf.animations[0]);
        action.play();
      }

      status.textContent = `✅ Loaded (${gltf.animations?.length || 0} animations)`;

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        model.rotation.y += 0.005;
        renderer.render(scene, camera);
      }
      animate();
    },
    (xhr) => {
      const percent = ((xhr.loaded / xhr.total) * 100).toFixed(0);
      status.textContent = `Loading ${percent}%...`;
    },
    (error) => {
      status.textContent = `❌ Error: ${error.message}`;
      console.error(filename, error);
    }
  );
}

window.selectModel = function(filename) {
  fetch('/api/select_avatar_model', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: filename })
  })
  .then(r => r.json())
  .then(data => {
    alert(`Model selected! Refresh the main UI to see: ${filename}`);
    document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
    event.target.closest('.model-card').classList.add('selected');
  })
  .catch(err => {
    console.error(err);
    // Just copy manually for now
    alert(`To use this model, run: Copy-Item "C:\\project\\vision\\assets\\${filename}" "C:\\project\\vision\\assets\\ultron-avatar.glb" -Force`);
  });
};
</script>
</body>
</html>

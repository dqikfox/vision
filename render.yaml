services:
  - type: web
    name: vision
    runtime: python
    plan: starter
    buildCommand: pip install .
    startCommand: python live_chat_app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_WIDGET_AGENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
